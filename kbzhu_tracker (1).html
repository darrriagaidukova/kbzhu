<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер КБЖУ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; padding: 16px; font-size: 13px; }
  h1 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .auth-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding: 10px 14px; border-radius: 8px; border: 1px solid; }
  .auth-bar.signed-out { background: #fff7ed; border-color: #fed7aa; }
  .auth-bar.signed-out span { color: #92400e; font-size: 12px; flex: 1; }
  .auth-bar.signed-out button { background: #f97316; border-color: #f97316; color: #fff; }
  .auth-bar.signed-in { background: #f0fdf4; border-color: #bbf7d0; }
  .auth-bar.signed-in span { color: #065f46; font-size: 12px; flex: 1; }
  .auth-bar.signed-in button { background: #6b7280; border-color: #6b7280; color: #fff; }
  .auth-bar button { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid; cursor: pointer; white-space: nowrap; }
  .status { font-size: 11px; margin-bottom: 10px; height: 16px; }
  .status.saving { color: #3b82f6; }
  .status.saved { color: #10b981; }
  .status.error { color: #ef4444; }
  .week-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .week-nav button { border: 1px solid #e5e7eb; background: #fff; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px; color: #374151; }
  .week-nav span { font-size: 13px; font-weight: 500; flex: 1; text-align: center; }
  .targets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .target-input { display: flex; align-items: center; gap: 6px; background: #f5f5f4; border-radius: 8px; padding: 6px 10px; }
  .target-input label { font-size: 11px; color: #6b7280; white-space: nowrap; }
  .target-input input { width: 56px; border: 1px solid #e5e7eb; border-radius: 5px; padding: 3px 6px; font-size: 12px; text-align: center; background: #fff; outline: none; }
  .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: #f5f5f4; border-radius: 8px; padding: 10px 12px; }
  .stat-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
  .stat-val { font-size: 18px; font-weight: 600; }
  .stat-unit { font-size: 11px; color: #9ca3af; margin-left: 2px; font-weight: 400; }
  .bar-wrap { height: 3px; background: #e5e7eb; border-radius: 2px; margin-top: 5px; overflow: hidden; }
  .bar { height: 100%; border-radius: 2px; transition: width .3s; }
  .bar-k { background: #3b82f6; } .bar-b { background: #10b981; } .bar-zh { background: #f97316; } .bar-u { background: #f59e0b; }
  .grid { border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; }
  .grid-head { display: grid; grid-template-columns: 76px repeat(7,1fr) 52px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
  .grid-head div { font-size: 11px; color: #6b7280; padding: 7px 4px; text-align: center; font-weight: 500; }
  .grid-head div:first-child { text-align: left; padding-left: 10px; }
  .grid-row { display: grid; grid-template-columns: 76px repeat(7,1fr) 52px; border-bottom: 1px solid #f3f4f6; }
  .grid-row:last-child { border-bottom: none; }
  .row-label { font-size: 11px; color: #6b7280; padding: 8px 6px 8px 10px; display: flex; align-items: center; gap: 5px; border-right: 1px solid #f3f4f6; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-k { background: #3b82f6; } .dot-b { background: #10b981; } .dot-zh { background: #f97316; } .dot-u { background: #f59e0b; }
  .cell { padding: 3px; }
  .cell input { width: 100%; border: 1px solid #f3f4f6; border-radius: 5px; padding: 5px 2px; font-size: 12px; text-align: center; background: #fff; outline: none; font-family: inherit; }
  .cell input:focus { border-color: #d1d5db; background: #fafafa; }
  .cell input.filled { background: #f9fafb; }
  .cell input::placeholder { color: #d1d5db; }
  .total-cell { padding: 3px; background: #f0fdf4; }
  .total-cell input { width: 100%; border: none; padding: 5px 2px; font-size: 11px; font-weight: 600; text-align: center; background: transparent; color: #059669; outline: none; font-family: inherit; cursor: default; }
  .week-row { display: grid; grid-template-columns: 76px repeat(7,1fr) 52px; background: #f9fafb; border-top: 1px solid #e5e7eb; }
  .week-label { font-size: 10px; font-weight: 600; color: #6b7280; padding: 7px 6px 7px 10px; display: flex; align-items: center; text-transform: uppercase; letter-spacing: .5px; }
  .week-val { font-size: 11px; font-weight: 600; color: #374151; padding: 7px 4px; text-align: center; }
  .week-total { background: #f0fdf4; font-size: 11px; font-weight: 700; color: #059669; padding: 7px 4px; text-align: center; }
</style>
</head>
<body>

<h1>Трекер КБЖУ</h1>

<div class="auth-bar signed-out" id="auth-bar">
  <span id="auth-text">Войди в Google чтобы сохранять данные</span>
  <button onclick="handleAuth()">Войти в Google</button>
</div>

<div class="status" id="status"></div>

<div class="week-nav">
  <button onclick="changeWeek(-1)">←</button>
  <span id="week-label"></span>
  <button onclick="changeWeek(1)">→</button>
</div>

<div class="targets">
  <div class="target-input"><label>Цель ккал</label><input id="t-k" type="number" value="1500" min="0" step="50"></div>
  <div class="target-input"><label>Белок г</label><input id="t-b" type="number" value="110" min="0" step="5"></div>
  <div class="target-input"><label>Жиры г</label><input id="t-zh" type="number" value="55" min="0" step="5"></div>
  <div class="target-input"><label>Углеводы г</label><input id="t-u" type="number" value="130" min="0" step="5"></div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">Ккал среднее/день</div><div class="stat-val"><span id="avg-k">—</span><span class="stat-unit">ккал</span></div><div class="bar-wrap"><div class="bar bar-k" id="pct-k" style="width:0%"></div></div></div>
  <div class="stat"><div class="stat-label">Белок среднее/день</div><div class="stat-val"><span id="avg-b">—</span><span class="stat-unit">г</span></div><div class="bar-wrap"><div class="bar bar-b" id="pct-b" style="width:0%"></div></div></div>
  <div class="stat"><div class="stat-label">Жиры среднее/день</div><div class="stat-val"><span id="avg-zh">—</span><span class="stat-unit">г</span></div><div class="bar-wrap"><div class="bar bar-zh" id="pct-zh" style="width:0%"></div></div></div>
  <div class="stat"><div class="stat-label">Углев. среднее/день</div><div class="stat-val"><span id="avg-u">—</span><span class="stat-unit">г</span></div><div class="bar-wrap"><div class="bar bar-u" id="pct-u" style="width:0%"></div></div></div>
</div>

<div class="grid">
  <div class="grid-head">
    <div></div><div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div><div>Итог</div>
  </div>
  <div class="grid-row">
    <div class="row-label"><span class="dot dot-k"></span>Ккал</div>
    <div class="cell"><input type="number" min="0" data-row="k" data-col="0" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="k" data-col="1" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="k" data-col="2" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="k" data-col="3" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="k" data-col="4" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="k" data-col="5" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="k" data-col="6" placeholder="—"></div>
    <div class="total-cell"><input id="sum-k" readonly placeholder="—"></div>
  </div>
  <div class="grid-row">
    <div class="row-label"><span class="dot dot-b"></span>Белок</div>
    <div class="cell"><input type="number" min="0" data-row="b" data-col="0" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="b" data-col="1" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="b" data-col="2" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="b" data-col="3" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="b" data-col="4" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="b" data-col="5" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="b" data-col="6" placeholder="—"></div>
    <div class="total-cell"><input id="sum-b" readonly placeholder="—"></div>
  </div>
  <div class="grid-row">
    <div class="row-label"><span class="dot dot-zh"></span>Жиры</div>
    <div class="cell"><input type="number" min="0" data-row="zh" data-col="0" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="zh" data-col="1" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="zh" data-col="2" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="zh" data-col="3" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="zh" data-col="4" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="zh" data-col="5" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="zh" data-col="6" placeholder="—"></div>
    <div class="total-cell"><input id="sum-zh" readonly placeholder="—"></div>
  </div>
  <div class="grid-row">
    <div class="row-label"><span class="dot dot-u"></span>Углев.</div>
    <div class="cell"><input type="number" min="0" data-row="u" data-col="0" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="u" data-col="1" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="u" data-col="2" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="u" data-col="3" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="u" data-col="4" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="u" data-col="5" placeholder="—"></div>
    <div class="cell"><input type="number" min="0" data-row="u" data-col="6" placeholder="—"></div>
    <div class="total-cell"><input id="sum-u" readonly placeholder="—"></div>
  </div>
  <div class="week-row">
    <div class="week-label">Ккал/день</div>
    <div class="week-val" id="d-0">—</div><div class="week-val" id="d-1">—</div>
    <div class="week-val" id="d-2">—</div><div class="week-val" id="d-3">—</div>
    <div class="week-val" id="d-4">—</div><div class="week-val" id="d-5">—</div>
    <div class="week-val" id="d-6">—</div>
    <div class="week-total" id="d-total">—</div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = '203414888398-eoilbeppdgceo8pfhmh23ocatcefrceo.apps.googleusercontent.com';
const SHEET_ID  = '1KpMpT1hgWY567tPso3LGDZsK4-FJvP1UAfCdwjPJ4zU';
const SCOPE     = 'https://www.googleapis.com/auth/spreadsheets';
const ROWS      = ['k','b','zh','u'];
const LABELS    = {k:'Ккал',b:'Белок г',zh:'Жиры г',u:'Углев. г'};
const DAYS      = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

let accessToken = null;
let weekOffset  = 0;
let saveTimer   = null;
let tokenClient = null;
const data = {k:[null,null,null,null,null,null,null],b:[null,null,null,null,null,null,null],zh:[null,null,null,null,null,null,null],u:[null,null,null,null,null,null,null]};

function getMonday(offset) {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1 + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function getWeekKey(offset) {
  const mon = getMonday(offset);
  const y = mon.getFullYear();
  const tmp = new Date(Date.UTC(y, mon.getMonth(), mon.getDate()));
  const dayN = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - dayN);
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  const wn = Math.ceil((((tmp - yearStart)/86400000)+1)/7);
  return `${y}-W${String(wn).padStart(2,'0')}`;
}

function getWeekLabel(offset) {
  const mon = getMonday(offset);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const fmt = d => d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
  return `${fmt(mon)} — ${fmt(sun)}`;
}

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status ' + type;
}

function handleAuth() {
  if (accessToken) {
    accessToken = null;
    updateAuthUI(false);
    setStatus('Вышли из Google', '');
    return;
  }
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPE,
      callback: (resp) => {
        if (resp.error) { setStatus('Ошибка: ' + resp.error, 'error'); return; }
        accessToken = resp.access_token;
        updateAuthUI(true);
        loadFromSheets();
      }
    });
  }
  tokenClient.requestAccessToken();
}

function updateAuthUI(on) {
  const bar = document.getElementById('auth-bar');
  const txt = document.getElementById('auth-text');
  bar.className = 'auth-bar ' + (on ? 'signed-in' : 'signed-out');
  txt.textContent = on
    ? 'Подключено к Google Sheets — данные сохраняются автоматически'
    : 'Войди в Google чтобы сохранять данные';
  bar.querySelector('button').textContent = on ? 'Выйти' : 'Войти в Google';
}

function clearGrid() {
  ROWS.forEach(r => { data[r] = [null,null,null,null,null,null,null]; });
  document.querySelectorAll('input[data-row]').forEach(inp => {
    inp.value = ''; inp.classList.remove('filled');
  });
}

function changeWeek(dir) {
  weekOffset += dir;
  document.getElementById('week-label').textContent = getWeekLabel(weekOffset);
  clearGrid(); recalc();
  if (accessToken) loadFromSheets();
}

async function loadFromSheets() {
  const key = getWeekKey(weekOffset);
  setStatus('Загрузка...', 'saving');
  try {
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(key+'!A1:I5')}`,
      { headers: { Authorization: 'Bearer ' + accessToken } }
    );
    const json = await res.json();
    if (!json.values || json.values.length < 2) { setStatus('Нет данных за эту неделю', ''); return; }
    json.values.slice(1).forEach((row, ri) => {
      const r = ROWS[ri]; if (!r) return;
      for (let c = 0; c < 7; c++) {
        const v = row[c+1];
        data[r][c] = (v !== undefined && v !== '') ? +v : null;
        const inp = document.querySelector(`input[data-row="${r}"][data-col="${c}"]`);
        if (inp) { inp.value = data[r][c] !== null ? data[r][c] : ''; inp.classList.toggle('filled', data[r][c] !== null); }
      }
    });
    recalc();
    setStatus('Загружено ✓', 'saved');
    setTimeout(() => setStatus(''), 2000);
  } catch(e) { setStatus('Ошибка загрузки', 'error'); }
}

async function saveToSheets() {
  if (!accessToken) return;
  const key = getWeekKey(weekOffset);
  setStatus('Сохранение...', 'saving');
  const values = [
    ['', ...DAYS],
    ...ROWS.map(r => [LABELS[r], ...data[r].map(v => v !== null ? v : '')])
  ];
  try {
    await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(key+'!A1')}?valueInputOption=RAW`,
      { method:'PUT', headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
        body: JSON.stringify({ range: key+'!A1', majorDimension:'ROWS', values }) }
    );
    setStatus('Сохранено ✓', 'saved');
    setTimeout(() => setStatus(''), 2000);
  } catch(e) { setStatus('Ошибка сохранения', 'error'); }
}

function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToSheets, 1500); }

function recalc() {
  const targets = { k: +document.getElementById('t-k').value||1500, b: +document.getElementById('t-b').value||110, zh: +document.getElementById('t-zh').value||55, u: +document.getElementById('t-u').value||130 };
  for (let c=0;c<7;c++) document.getElementById('d-'+c).textContent = data.k[c]!==null ? Math.round(data.k[c]) : '—';
  const kv = data.k.filter(v=>v!==null);
  document.getElementById('d-total').textContent = kv.length ? Math.round(kv.reduce((a,b)=>a+b,0)) : '—';
  ROWS.forEach(r => {
    const vals = data[r].filter(v=>v!==null);
    const sum = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)) : null;
    const el = document.getElementById('sum-'+r);
    el.value = sum!==null ? sum : ''; el.placeholder = '—';
    if (!vals.length) { document.getElementById('avg-'+r).textContent='—'; document.getElementById('pct-'+r).style.width='0%'; return; }
    const avg = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    document.getElementById('avg-'+r).textContent = avg;
    document.getElementById('pct-'+r).style.width = Math.min(100,Math.round(avg/targets[r]*100))+'%';
  });
}

document.querySelectorAll('input[data-row]').forEach(inp => {
  inp.addEventListener('input', () => {
    data[inp.dataset.row][+inp.dataset.col] = inp.value==='' ? null : +inp.value;
    inp.classList.toggle('filled', inp.value!=='');
    recalc(); scheduleSave();
  });
});
['t-k','t-b','t-zh','t-u'].forEach(id => document.getElementById(id).addEventListener('input', recalc));
document.getElementById('week-label').textContent = getWeekLabel(0);
</script>
</body>
</html>
